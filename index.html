<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- LinkedIn / Open Graph tags -->
  <meta property="og:title"        content="Melissa & Doug Hall of Fame" />
  <meta property="og:description"  content="Melissa and Doug honored at Hall of Fame award ceremony" />
  <meta property="og:image"        content="https://i.vimeocdn.com/video/2134765774-a3b7c92cc54dff4d808de08d85e1c95ac4cb2473d0810e17fec342b7b43b5251-d?f=webp&region=us" />
  <meta property="og:image:width"  content="1200" />
  <meta property="og:image:height" content="627" />
  <meta property="og:type"         content="video.other" />
  <meta property="og:url"          content="https://lifelinesvideo.github.io/2026hofnyc/" />
  <title>Melissa & Doug inducted into Toy Industry Hall of Fame</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: Arial, sans-serif;
      background: #fff;
    }
    h1 {
      font-size: clamp(1.2rem, 4vw, 2rem);
      margin-bottom: 10px;
    }
    p {
      font-size: clamp(0.9rem, 2.5vw, 1.1rem);
      margin-bottom: 20px;
    }
    .video-wrapper {
      position: relative;
      padding: 56.25% 0 0 0;
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
    }
    .video-wrapper iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    /* Hide on desktop */
    .mobile-only {
      display: none;
    }
    /* Show on mobile */
    @media (max-width: 768px) {
      .mobile-only {
        display: block;
      }
    }

  </style>
</head>
<body>
  <h1>Melissa &amp; Doug inducted into Toy Industry Hall of Fame</h1>
  <p>Click Unmute to enable sound.</p>
  <div class="video-wrapper">
    <iframe src="https://player.vimeo.com/video/1174088144?title=0&byline=0&portrait=0&badge=0&autopause=0&autoplay=1&muted=1"
      frameborder="0"
      allow="autoplay; fullscreen"
      allowfullscreen>
    </iframe>
  </div>

<script>
  function isMobile() {
    return /Android|iPhone|iPad|iPod|Opera Mini|IEMobile|WPDesktop/i.test(navigator.userAgent);
  }
  if (isMobile()) {
    const iframe = document.querySelector('.video-wrapper iframe');
    document.addEventListener('click', function triggerFullscreen() {
      if (iframe.requestFullscreen) {
        iframe.requestFullscreen();
      } else if (iframe.webkitRequestFullscreen) {
        iframe.webkitRequestFullscreen();
      } else if (iframe.mozRequestFullScreen) {
        iframe.mozRequestFullScreen();
      }
      document.removeEventListener('click', triggerFullscreen);
    }, { once: true });
  }
</script>
</body>
</html>
