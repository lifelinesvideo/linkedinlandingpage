<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- LinkedIn / Open Graph tags -->
  <meta property="og:title"        content="Melissa & Doug Hall of Fame" />
  <meta property="og:description"  content="Melissa and Doug honored at Hall of Fame award ceremony" />
  <meta property="og:image"        content="https://i.vimeocdn.com/video/2134765774-a3b7c92cc54dff4d808de08d85e1c95ac4cb2473d0810e17fec342b7b43b5251-d?f=webp&region=us" />
  <meta property="og:image:width"  content="1200" />
  <meta property="og:image:height" content="627" />
  <meta property="og:type"         content="video.other" />
  <meta property="og:url"          content="https://lifelinesvideo.github.io/2026hofnyc/" />
  <title>Melissa & Doug inducted into Toy Industry Hall of Fame</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: Arial, sans-serif;
      background: #fff;
    }
    h1 {
      font-size: clamp(1.2rem, 4vw, 2rem);
      margin-bottom: 10px;
    }
    .video-wrapper {
      position: relative;
      padding: 56.25% 0 0 0;
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
    }
    .video-wrapper iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
    #unmute-btn {
      display: block;
      margin: 15px auto;
      padding: 12px 28px;
      font-size: 1rem;
      background-color: #1ab7ea;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    #unmute-btn:hover {
      background-color: #0f9dc7;
    }
    #unmute-btn.hidden {
      display: none;
    }
  </style>
</head>
<body>
  <h1>Melissa &amp; Doug inducted into Toy Industry Hall of Fame</h1>

  <button id="unmute-btn">Click the image below to see Melissa and Doug speaking at the Hall of Fame ceremony.  </button>

  <div class="video-wrapper">
    <iframe id="vimeo-iframe"
      src="https://player.vimeo.com/video/1174088144?title=0&byline=0&portrait=0&badge=0&autopause=0&autoplay=0&muted=0&playsinline=0"
      frameborder="0"
      allow="autoplay; fullscreen"
      allowfullscreen>
    </iframe>
  </div>

  <!-- Vimeo Player API -->
  <script src="https://player.vimeo.com/api/player.js"></script>
  <script>
    const iframe = document.getElementById('vimeo-iframe');
    const player = new Vimeo.Player(iframe);
    const unmuteBtn = document.getElementById('unmute-btn');

    function isMobile() {
      return /Android|iPhone|iPad|iPod|Opera Mini|IEMobile|WPDesktop/i.test(navigator.userAgent);
    }

    player.ready().then(function() {

      // Unmute button — single tap fix for iOS
      unmuteBtn.addEventListener('click', function() {
        player.setMuted(false).then(function() {
          player.play();
          unmuteBtn.classList.add('hidden');
        }).catch(function(err) {
          console.error('Unmute failed:', err);
        });
      });

      // Go fullscreen when video starts playing on mobile only
      if (isMobile()) {
        player.on('play', function() {
          if (iframe.requestFullscreen) {
            iframe.requestFullscreen();
          } else if (iframe.webkitRequestFullscreen) {
            iframe.webkitRequestFullscreen(); // Safari/iOS
          } else if (iframe.mozRequestFullScreen) {
            iframe.mozRequestFullScreen(); // Firefox
          }
          // Remove listener so it only fires once
          player.off('play');
        });
      }

    });
  </script>
</body>
</html>
